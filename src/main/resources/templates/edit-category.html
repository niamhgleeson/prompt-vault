<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Category</title>
</head>
<body>

<h1>Edit Category</h1>

<form th:action="@{'/web/categories/edit/' + ${category.id}}" method="post">

  <label>Name</label><br>
  <input type="text" name="name" th:value="${category.name}">
  <br><br>

  <label>Description</label><br>
  <input type="text" name="description" th:value="${category.description}">
  <br><br>

  <button type="submit">Save Changes</button>

</form>

<br>

<a href="/admin-categories-page">Back to categories</a>

</body>
</html>
