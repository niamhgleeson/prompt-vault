<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Prompt</title>
</head>
<body>

<h1>Edit Prompt</h1>

<form th:action="@{'/web/prompts/edit/' + ${prompt.id}}" method="post">

  <label>Title</label><br>
  <input type="text" name="title" th:value="${prompt.title}">
  <br><br>

  <label>Prompt Text</label><br>
  <textarea name="promptText" th:text="${prompt.promptText}"></textarea>
  <br><br>

  <label>Visibility</label><br>
  <select name="visibility">
    <option value="PRIVATE">PRIVATE</option>
    <option value="SHARED">SHARED</option>
  </select>
  <br><br>

  <label>Category</label><br>
  <select name="categoryId">
    <option
            th:each="category : ${categories}"
            th:value="${category.id}"
            th:text="${category.name}">
    </option>
  </select>

  <br><br>

  <button type="submit">Save Changes</button>

</form>

<br>
<a href="/user-prompts-page">Back</a>

</body>
</html>
