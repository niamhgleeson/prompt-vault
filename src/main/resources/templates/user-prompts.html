<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Prompts</title>
</head>
<body>

<h1>User Prompts</h1>

<p th:if="${warning}" th:text="${warning}" style="color:red;"></p>
<p th:if="${message}" th:text="${message}" style="color:green;"></p>

<p th:if="${simulatedResponse}"
   th:text="'Simulated AI Response: ' + ${simulatedResponse}"
   style="color:blue;">
</p>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Prompt Text</th>
        <th>Visibility</th>
        <th>Category</th>
        <th>Flagged</th>
        <th>Actions</th>
    </tr>

    <tr th:each="prompt : ${prompts}">
        <td th:text="${prompt.title}"></td>
        <td th:text="${prompt.promptText}"></td>
        <td th:text="${prompt.visibility}"></td>
        <td th:text="${prompt.category.name}"></td>
        <td th:text="${prompt.flagged}"></td>
        <td>
            <a th:href="@{'/edit-prompt-page/' + ${prompt.id}}">
                Edit
            </a>
            <br><br>
            <form th:action="@{'/web/prompts/delete/' + ${prompt.id}}"
                    method="post">
                <button type="submit">Delete</button>
            </form>
            <br>
            <form th:action="@{'/web/prompts/submit/' + ${prompt.id}}"
                    method="post">
                <button type="submit">Submit</button>
            </form>
        </td>
    </tr>
</table>

<br>

<a href="/user-dashboard">Back to dashboard</a>

</body>
</html>
